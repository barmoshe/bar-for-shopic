name: ci

# Lint + build gate on every push and PR. The jsx-a11y accessibility floor is a
# deploy gate (WCAG 2.2 AA); a Vercel deploy should sit behind this passing.
on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
